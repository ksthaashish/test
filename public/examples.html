<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字帳 — All Examples</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=BIZ+UDMincho:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700;900&display=swap">
<link rel="stylesheet" href="/css/shared.css">
<style>
.search-wrap {
  position: relative;
  max-width: 360px;
}
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-4);
  font-size: 0.9rem;
  pointer-events: none;
}
#search-input {
  padding-left: 32px;
}
.result-count {
  font-size: 0.78rem;
  color: var(--ink-3);
  margin-bottom: 16px;
}
</style>
</head>
<body class="app-wrap">

<header>
  <a class="logo" href="/">
    <span class="logo-kanji">漢</span>
    <span class="logo-text">Kanji Notebook</span>
  </a>
  <nav class="site-nav">
    <a href="/">Home</a>
    <a href="/examples.html">Examples</a>
    <a href="/quiz.html">Quiz</a>
    <a href="/match.html">Match</a>
    <a href="/srs.html">SRS</a>
  </nav>
</header>

<main class="page-content">
  <div class="page-title">
    <div>
      <h1>All Examples</h1>
      <p class="text-muted">Every sentence from all kanji</p>
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="form-control" id="search-input" placeholder="Search examples…" oninput="filterTable()">
    </div>
  </div>

  <p class="result-count" id="result-count">Loading…</p>

  <div class="card table-wrap" style="padding:0;overflow:hidden">
    <table id="examples-table">
      <thead>
        <tr>
          <th onclick="sortBy('kanji')">Kanji <span class="sort-icon" id="sort-kanji">↕</span></th>
          <th onclick="sortBy('parent')">Parent <span class="sort-icon" id="sort-parent">↕</span></th>
          <th onclick="sortBy('hiragana')">Hiragana <span class="sort-icon" id="sort-hiragana">↕</span></th>
          <th onclick="sortBy('english')">English <span class="sort-icon" id="sort-english">↕</span></th>
        </tr>
      </thead>
      <tbody id="examples-body"></tbody>
    </table>
  </div>
</main>

<div id="toast-container"></div>
<script src="/js/shared.js"></script>
<script>
let allExamples = [];
let filtered = [];
let sortKey = 'parent';
let sortDir = 1;

async function init() {
  try {
    const kanji = await api.get('/api/kanji');
    allExamples = [];
    for (const k of kanji) {
      for (const ex of (k.examples || [])) {
        allExamples.push({ kanji: ex.kanji, hiragana: ex.hiragana, english: ex.english, parent: k.character, category: k.category });
      }
    }
    filtered = [...allExamples];
    render();
  } catch(e) {
    showToast('Failed to load', 'error');
  }
}

function filterTable() {
  const q = document.getElementById('search-input').value.toLowerCase();
  filtered = q
    ? allExamples.filter(e =>
        e.kanji.toLowerCase().includes(q) ||
        e.hiragana.toLowerCase().includes(q) ||
        e.english.toLowerCase().includes(q) ||
        e.parent.includes(q))
    : [...allExamples];
  render();
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  document.querySelectorAll('.sort-icon').forEach(el => el.textContent = '↕');
  document.getElementById(`sort-${key}`).textContent = sortDir === 1 ? '↑' : '↓';
  render();
}

function render() {
  filtered.sort((a, b) => (a[sortKey] || '').localeCompare(b[sortKey] || '') * sortDir);
  document.getElementById('result-count').textContent = `${filtered.length} of ${allExamples.length} examples`;
  document.getElementById('examples-body').innerHTML = filtered.map(e => `
    <tr>
      <td class="td-kanji">${e.kanji}</td>
      <td><a href="/detail.html?k=${encodeURIComponent(e.parent)}" class="td-link">${e.parent}</a></td>
      <td class="td-hira">${e.hiragana}</td>
      <td>${e.english}</td>
    </tr>
  `).join('') || '<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--ink-4);font-style:italic">No results</td></tr>';
}

init();
</script>
</body>
</html>
